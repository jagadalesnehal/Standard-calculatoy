<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>standard calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: rgba(190, 224, 167, 0.541);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-card {
            width: 500px;
        }

        .calc-screen {
            font-size: 3rem;
            height: 90px;
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="card calculator-card p-3 bg-dark text-light rounded-4">
        <input type="text" id="display" class="form-control calc-screen mb-3 bg-secondary text-white border-0" value=""
            readonly />
        <div class="d-grid gap-2">
            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-danger w-100 fw-bold" data-action="clear">C</button>
                </div>

                <div class="col-3">
                    <button class="btn btn-info w-100 fw-bold" data-operator="/">÷</button>
                </div>

                <div class="col-3">
                    <button class="btn btn-info w-100 fw-bold" data-operator="*">*</button>
                </div>
            </div>
            <div class="row g-2">
                <div class="col-3">
                    <button class="btn btn-light w-100 " data-number="7">7</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light w-100" data-number="8">8</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light w-100 " data-number="9">9</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-info w-100 fw-bold" data-operator="-">-</button>
                </div>
            </div>
            <div class="row g-2">
                <div class="col-3">
                    <button class="btn btn-light w-100" data-number="4">4</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light w-100" data-number="5">5</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light w-100" data-number="6">6</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-info w-100 fw-bold" data-operator="+">+</button>
                </div>
            </div>

            <div class="row g-2">
                <div class="col-9">
                    <div class="row g-2 mb-2">
                        <div class="col-4">
                            <button class="btn btn-light w-100" data-number="1">1</button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-light w-100" data-number="2">2</button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-light w-100" data-number="3">3</button>
                        </div>
                    </div>

                    <div class="row g-2">
                        <div class="col-8">
                            <button class="btn btn-light w-100" data-number="0">0</button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-light w-100" data-number=".">.</button>
                        </div>
                    </div>
                </div>

                <div class="col-3 d-flex">
                    <button class="btn btn-success w-100 fw-bold h-100" data-action="calculate"> =</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
